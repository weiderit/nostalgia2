<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя Любимая Семья - Ностальгия 2.0</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        .marquee-text {
            display: inline-block;
            white-space: nowrap;
            animation: marquee 15s linear infinite;
        }
        .shadow-win98 { box-shadow: 4px 4px 0 rgba(0,0,0,0.5); }
        .win98-border { border-top: 2px solid white; border-left: 2px solid white; border-right: 2px solid black; border-bottom: 2px solid black; }
        .win98-border-inset { border-top: 2px solid black; border-left: 2px solid black; border-right: 2px solid white; border-bottom: 2px solid white; }
        body { 
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive; 
            background-color: #008080; /* Тот самый зеленый фон Windows 95/98 */
        }
        .btn-win98 { 
            background: #c0c0c0; 
            border-top: 2px solid white; 
            border-left: 2px solid white; 
            border-right: 2px solid black; 
            border-bottom: 2px solid black; 
            padding: 2px 12px;
            color: black;
            font-weight: bold;
            font-size: 14px;
        }
        .btn-win98:active { 
            border-top: 2px solid black; 
            border-left: 2px solid black; 
            border-right: 2px solid white; 
            border-bottom: 2px solid white; 
        }
        .active-tab {
            background: #eeeeee !important;
            border-top: 2px solid black !important;
            border-left: 2px solid black !important;
            border-right: 2px solid white !important;
            border-bottom: 2px solid white !important;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SUPABASE_URL = 'https://uqfbphufpjbovmifieyt.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVxZmJwaHVmcGpib3ZtaWZpZXl0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMzUyNTEsImV4cCI6MjA5MjYxMTI1MX0.IDBaE23z1eIjbjqk-DuSWtO41YUWlXIrN7elt80QD6o';

        const supabase = window.supabase.createClient(
            SUPABASE_URL,
            SUPABASE_ANON_KEY
        );

        const INITIAL_PHOTOS = [
            { id: 1, src: "image_9663f1.jpg", caption: "Алим 1999 года рождения" },
            { id: 2, src: "image_966375.jpg", caption: "Снизу Ибраим 2008 года, сверху Билял 2004 года" },
            { id: 3, src: "image_96602f.jpg", caption: "Слева Ленние 2003 года рождения, справа Амина 2001 года рождения" },
            { id: 4, src: "image_965f9a.jpg", caption: "Дочка Амины — Эдие" },
            { id: 5, src: "image_965c8d.jpg", caption: "Амина в детстве" },
            { id: 6, src: "image_965c11.jpg", caption: "Общая семейная фотография" },
            { id: 7, src: "image_965872.jpg", caption: "Слева Билял, посередине Надика, справа Джемиль" },
            { id: 8, src: "image_9657f5.jpg", caption: "Слева Усние Къартанай, посередине Сусанна, справа Алашка" },
            { id: 9, src: "image_9654b1.jpg", caption: "Еще одна семейная фотография" },
            { id: 10, src: "image_965436.jpg", caption: "Слева Абильтар Къартбабай, посередине Усние Къартанай, справа Сусанна" },
        ];

        const INITIAL_PLAYLIST = [
            { id: 1, name: "Project_912.mp3", src: "Project_912.mp3" }
        ];

        function App() {
            const [activeTab, setActiveTab] = useState('home');
            const [photos, setPhotos] = useState([]);
            const [guestMessages, setGuestMessages] = useState([]);
            const [comments, setComments] = useState([]); // Состояние для комментариев к фото
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [viewingPhoto, setViewingPhoto] = useState(null);
            const [editingCaptionId, setEditingCaptionId] = useState(null);
            const [tempCaption, setTempCaption] = useState('');
            const [visits, setVisits] = useState(0);
            
            // Состояния для форм
            const [newPhotoPreview, setNewPhotoPreview] = useState(null);
            const [newCaption, setNewCaption] = useState('');
            const [guestName, setGuestName] = useState('');
            const [guestText, setGuestText] = useState('');
            
            // Состояния для комментариев под фото
            const [commentName, setCommentName] = useState('');
            const [commentText, setCommentText] = useState('');

            // Состояния для музыки
            const [playlist, setPlaylist] = useState([]);
            const [currentTrackIndex, setCurrentTrackIndex] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            const [isMusicModalOpen, setIsMusicModalOpen] = useState(false);
            const [newMusicSrc, setNewMusicSrc] = useState(null);
            const [newMusicName, setNewMusicName] = useState('');
            const [currentTimeStr, setCurrentTimeStr] = useState('00:00');
            const [durationStr, setDurationStr] = useState('00:00');
            const audioRef = useRef(null);

            useEffect(() => {
                const loadData = async () => {
                    // Загрузка фотографий
                    const { data: dbPhotos, error: photosError } = await supabase.from('photos').select('*').order('id', { ascending: false });
                    if (dbPhotos && dbPhotos.length > 0) {
                        setPhotos(dbPhotos);
                    } else if (!photosError) {
                        setPhotos([...INITIAL_PHOTOS].reverse());
                        await supabase.from('photos').upsert(INITIAL_PHOTOS);
                    }

                    // Загрузка гостевой книги
                    const { data: dbGuestbook } = await supabase.from('guestbook').select('*').order('id', { ascending: false });
                    if (dbGuestbook) setGuestMessages(dbGuestbook);

                    // Загрузка плейлиста
                    const { data: dbPlaylist, error: playlistError } = await supabase.from('playlist').select('*').order('id', { ascending: true });
                    if (dbPlaylist && dbPlaylist.length > 0) {
                        setPlaylist(dbPlaylist);
                    } else if (!playlistError) {
                        setPlaylist(INITIAL_PLAYLIST);
                        await supabase.from('playlist').upsert(INITIAL_PLAYLIST);
                    }

                    // Загрузка комментариев к фото
                    const { data: dbComments } = await supabase.from('comments').select('*').order('id', { ascending: true });
                    if (dbComments) setComments(dbComments);

                    // Логика счетчика посещений
                    const { data: dbVisits } = await supabase.from('visits').select('count').eq('id', 1).single();
                    const currentVisits = dbVisits ? dbVisits.count : 0;
                    const newVisits = currentVisits + 1;
                    
                    setVisits(newVisits);
                    await supabase.from('visits').upsert({ id: 1, count: newVisits });
                };

                loadData();
            }, []);

            const handleAddPhoto = async (e) => {
                e.preventDefault();
                const newPhotoId = Date.now();
                const newP = { id: newPhotoId, src: newPhotoPreview, caption: newCaption || 'Без названия' };
                
                setPhotos(prev => [newP, ...prev]);
                setIsModalOpen(false);
                setNewPhotoPreview(null);
                setNewCaption('');

                await supabase.from('photos').insert([newP]);
            };

            const deletePhoto = async (id) => {
                if (confirm('Удалить это воспоминание навсегда?')) {
                    setPhotos(prev => prev.filter(p => p.id !== id));
                    // Удаляем фото и связанные с ним комментарии
                    await supabase.from('comments').delete().eq('photo_id', id);
                    await supabase.from('photos').delete().eq('id', id);
                }
            };

            const startEditCaption = (photo) => {
                setEditingCaptionId(photo.id);
                setTempCaption(photo.caption);
            };

            const saveCaption = async (e) => {
                e.preventDefault();
                const captionToSave = tempCaption;
                const idToSave = editingCaptionId;

                setPhotos(prev => prev.map(p => p.id === idToSave ? {...p, caption: captionToSave} : p));
                setEditingCaptionId(null);

                await supabase.from('photos').update({ caption: captionToSave }).eq('id', idToSave);
            };

            const addGuestMessage = async (e) => {
                e.preventDefault();
                const newId = Date.now();
                const newMessage = { id: newId, name: guestName, text: guestText, date: new Date().toLocaleDateString() };
                
                setGuestMessages(prev => [newMessage, ...prev]);
                setGuestName('');
                setGuestText('');

                await supabase.from('guestbook').insert([newMessage]);
            };

            const deleteGuestMessage = async (id) => {
                if (confirm('Удалить эту историю?')) {
                    setGuestMessages(prev => prev.filter(msg => msg.id !== id));
                    await supabase.from('guestbook').delete().eq('id', id);
                }
            };

            // Добавление комментария к фото
            const handleAddComment = async (e, photoId) => {
                e.preventDefault();
                const newComment = {
                    id: Date.now(),
                    photo_id: photoId,
                    author: commentName || 'Аноним',
                    text: commentText
                };
                
                setComments(prev => [...prev, newComment]);
                setCommentName('');
                setCommentText('');

                await supabase.from('comments').insert([newComment]);
            };

            // Удаление комментария
            const deleteComment = async (id) => {
                if (confirm('Удалить эту мысль?')) {
                    setComments(prev => prev.filter(c => c.id !== id));
                    await supabase.from('comments').delete().eq('id', id);
                }
            };

            // Функции Музыкального плеера
            const togglePlay = () => {
                if (isPlaying) {
                    audioRef.current.pause();
                    setIsPlaying(false);
                } else {
                    audioRef.current.play().then(() => setIsPlaying(true)).catch(e => console.error(e));
                }
            };

            const stopTrack = () => {
                audioRef.current.pause();
                audioRef.current.currentTime = 0;
                setIsPlaying(false);
            };

            const nextTrack = () => {
                if (playlist.length === 0) return;
                const nextIdx = (currentTrackIndex + 1) % playlist.length;
                setCurrentTrackIndex(nextIdx);
                setIsPlaying(true);
            };

            const prevTrack = () => {
                if (playlist.length === 0) return;
                const prevIdx = (currentTrackIndex - 1 + playlist.length) % playlist.length;
                setCurrentTrackIndex(prevIdx);
                setIsPlaying(true);
            };

            useEffect(() => {
                if (audioRef.current && isPlaying && playlist.length > 0) {
                    audioRef.current.play().catch(e => {
                        console.log("Автозапуск заблокирован", e);
                        setIsPlaying(false);
                    });
                }
            }, [currentTrackIndex, playlist]);

            const formatTime = (time) => {
                if (isNaN(time)) return '00:00';
                const mins = Math.floor(time / 60);
                const secs = Math.floor(time % 60);
                return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            };

            const handleTimeUpdate = () => {
                if (audioRef.current) setCurrentTimeStr(formatTime(audioRef.current.currentTime));
            };

            const handleLoadedMetadata = () => {
                if (audioRef.current) setDurationStr(formatTime(audioRef.current.duration));
            };

            const handleAddMusic = async (e) => {
                e.preventDefault();
                if (!newMusicSrc || !newMusicName) return;
                try {
                    const newTrack = { id: Date.now(), name: newMusicName, src: newMusicSrc };
                    
                    setPlaylist(prev => [...prev, newTrack]);
                    setIsMusicModalOpen(false);
                    setNewMusicSrc(null);
                    setNewMusicName('');

                    const { error } = await supabase.from('playlist').insert([newTrack]);
                    if (error) throw error;
                } catch (error) {
                    console.error(error);
                    alert('Ошибка сохранения. Возможно, аудиофайл слишком большой!');
                }
            };

            const deleteTrack = async (id, e) => {
                e.stopPropagation();
                if (confirm('Удалить этот трек?')) {
                    const deletedIndex = playlist.findIndex(t => t.id === id);
                    const updated = playlist.filter(t => t.id !== id);
                    
                    setPlaylist(updated);
                    
                    if (updated.length === 0 || deletedIndex === currentTrackIndex) {
                        stopTrack();
                        setCurrentTrackIndex(0);
                    } else if (deletedIndex < currentTrackIndex) {
                        setCurrentTrackIndex(prev => prev - 1);
                    }

                    await supabase.from('playlist').delete().eq('id', id);
                }
            };

            // Сбор последних активностей (без комментариев к фото, по просьбе)
            const recentActivities = [
                ...photos.map(p => ({ label: 'Новая фотография', text: p.caption, id: p.id })),
                ...guestMessages.map(m => ({ label: `Воспоминание от ${m.name}`, text: m.text, id: m.id })),
                ...playlist.map(t => ({ label: 'Новый трек', text: t.name, id: t.id }))
            ].sort((a, b) => b.id - a.id).slice(0, 5);

            return (
                <div className="min-h-screen p-2 sm:p-4 flex flex-col items-center">
                    
                    <audio 
                        ref={audioRef} 
                        src={playlist[currentTrackIndex]?.src} 
                        onEnded={nextTrack} 
                        onTimeUpdate={handleTimeUpdate}
                        onLoadedMetadata={handleLoadedMetadata}
                    />

                    {/* Тот самый Desktop из 90-х */}
                    <div className="w-full max-w-6xl bg-[#c0c0c0] win98-border shadow-win98 flex flex-col">
                        
                        {/* Заголовок окна */}
                        <div className="bg-gradient-to-r from-[#000080] to-[#1084d0] p-1 flex justify-between items-center text-white px-2">
                            <span className="font-bold text-xs sm:text-sm flex items-center gap-1 sm:gap-2 truncate pr-2">
                                🏠 C:\WINDOWS\Desktop\Family_Archive.exe
                            </span>
                            <div className="flex gap-1 flex-shrink-0">
                                <button className="btn-win98 py-0 px-2 text-xs">_</button>
                                <button className="btn-win98 py-0 px-2 text-xs">□</button>
                                <button className="btn-win98 py-0 px-2 text-xs bg-red-400">X</button>
                            </div>
                        </div>

                        {/* Меню Навигации */}
                        <div className="p-2 border-b border-gray-400 flex flex-wrap gap-2 bg-[#c0c0c0]">
                            <button onClick={() => setActiveTab('home')} className={`btn-win98 ${activeTab === 'home' ? 'active-tab' : ''}`}>ГЛАВНАЯ</button>
                            <button onClick={() => setActiveTab('album')} className={`btn-win98 ${activeTab === 'album' ? 'active-tab' : ''}`}>ФОТОАЛЬБОМ</button>
                            <button onClick={() => setActiveTab('music')} className={`btn-win98 ${activeTab === 'music' ? 'active-tab' : ''}`}>МУЗ. ПЛЕЕР</button>
                            <button onClick={() => setActiveTab('guest')} className={`btn-win98 ${activeTab === 'guest' ? 'active-tab' : ''}`}>ВОСПОМИНАНИЯ</button>
                        </div>

                        {/* Основной контент */}
                        <div className="bg-white m-1 sm:m-2 p-3 sm:p-6 win98-border-inset min-h-[400px] sm:min-h-[500px] overflow-y-auto overflow-x-hidden text-black">
                            
                            {/* ТАБ: ГЛАВНАЯ */}
                            {activeTab === 'home' && (
                                <div className="text-center space-y-4 sm:space-y-6">
                                    <h2 className="text-2xl sm:text-4xl text-blue-800 font-bold italic underline">Добро пожаловать в наше прошлое!</h2>
                                    <div className="flex justify-center">
                                        <img src="https://web.archive.org/web/20091027053531im_/http://geocities.com/Heartland/Acres/1814/welcome1.gif" alt="Welcome" className="max-w-full h-auto px-2" />
                                    </div>
                                    <p className="text-base sm:text-xl max-w-2xl mx-auto">
                                        Этот сайт создан для того, чтобы хранить самые теплые моменты нашей семьи. 
                                        Здесь вы найдете фотографии Алима, Ибраима, Биляла, Амины и всех наших близких.
                                    </p>

                                    {/* БЛОК ОБНОВЛЕНИЙ */}
                                    <div className="max-w-2xl mx-auto bg-[#c0c0c0] win98-border-inset p-3 text-left">
                                        <div className="bg-[#000080] text-white px-2 py-1 font-bold text-xs mb-2">ЧТО НОВОГО?</div>
                                        <div className="bg-white border-2 border-inset border-gray-500 p-2 text-sm max-h-[150px] overflow-y-auto">
                                            {recentActivities.length > 0 ? (
                                                <ul className="space-y-2">
                                                    {recentActivities.map((act, idx) => (
                                                        <li key={idx} className="flex gap-2 border-b border-dashed border-gray-300 pb-1 last:border-0">
                                                            <span className="text-red-600 font-bold">*</span>
                                                            <span><b className="text-blue-800">{act.label}:</b> <i className="text-gray-700">{act.text}</i></span>
                                                        </li>
                                                    ))}
                                                </ul>
                                            ) : (
                                                <p className="text-gray-500 italic">Ждем новых обновлений...</p>
                                            )}
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-2 sm:gap-4 p-2 sm:p-4 border-2 border-dashed border-gray-300 text-xs sm:text-base">
                                        <div className="p-2 bg-yellow-100 border">Нас посетили: <br className="sm:hidden" /><b>{visits}</b> раз</div>
                                        <div className="p-2 bg-blue-100 border">Фотографий: <br className="sm:hidden" /><b>{photos.length}</b></div>
                                        <div className="p-2 bg-green-100 border">Статус: <br className="sm:hidden" /><b>Online</b></div>
                                        <div className="p-2 bg-purple-100 border">Год: <br className="sm:hidden" /><b>2000-е</b></div>
                                    </div>
                                    <marquee className="text-red-600 font-bold text-sm sm:text-lg">!!! СМОТРИТЕ НОВЫЕ ФОТОГРАФИИ В РАЗДЕЛЕ АЛЬБОМ !!! НАЖИМАЙТЕ НА ФОТО, ЧТОБЫ ОСТАВИТЬ СВОИ МЫСЛИ !!!</marquee>
                                </div>
                            )}

                            {/* ТАБ: АЛЬБОМ */}
                            {activeTab === 'album' && (
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                    {photos.map(photo => {
                                        const photoComments = comments.filter(c => c.photo_id === photo.id);
                                        return (
                                            <div key={photo.id} className="bg-[#c0c0c0] p-2 win98-border shadow-md group">
                                                <div className="relative bg-black aspect-video flex items-center justify-center overflow-hidden border-2 border-black cursor-pointer" onClick={() => setViewingPhoto(photo)}>
                                                    <img src={photo.src} className="max-w-full max-h-full object-contain" />
                                                    <button 
                                                        onClick={(e) => { e.stopPropagation(); deletePhoto(photo.id); }}
                                                        className="absolute top-1 right-1 bg-red-600 text-white text-[10px] px-1 border-t border-l border-white border-r border-b border-black opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity z-10"
                                                    >
                                                        УДАЛИТЬ
                                                    </button>
                                                    {photoComments.length > 0 && (
                                                        <div className="absolute bottom-1 left-1 bg-yellow-200 text-black text-[10px] font-bold px-1 win98-border opacity-90 pointer-events-none">
                                                            Мыслей: {photoComments.length}
                                                        </div>
                                                    )}
                                                </div>
                                                <div className="mt-2 bg-white win98-border-inset p-2 text-center min-h-[50px]">
                                                    {editingCaptionId === photo.id ? (
                                                        <form onSubmit={saveCaption} className="flex flex-col gap-1">
                                                            <input 
                                                                autoFocus
                                                                className="text-xs border p-1" 
                                                                value={tempCaption} 
                                                                onChange={e => setTempCaption(e.target.value)} 
                                                            />
                                                            <div className="flex gap-1 justify-center">
                                                                <button type="submit" className="text-[10px] bg-green-200 border px-1 font-bold">ОК</button>
                                                                <button onClick={() => setEditingCaptionId(null)} className="text-[10px] bg-red-200 border px-1 font-bold">ОТМЕНА</button>
                                                            </div>
                                                        </form>
                                                    ) : (
                                                        <p 
                                                            className="text-blue-900 font-bold italic cursor-pointer hover:underline"
                                                            onClick={() => startEditCaption(photo)}
                                                            title="Нажмите, чтобы изменить надпись"
                                                        >
                                                            {photo.caption}
                                                        </p>
                                                    )}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            )}

                            {/* ТАБ: МУЗЫКА */}
                            {activeTab === 'music' && (
                                <div className="flex flex-col items-center py-10 space-y-8">
                                    <div className="bg-[#c0c0c0] p-4 win98-border w-full max-w-sm">
                                        <div className="bg-black p-4 text-green-500 font-mono mb-4 text-center border-2 border-inset border-gray-600">
                                            <div className="text-xs">WINAMP 2.81</div>
                                            <div className={`text-lg mt-1 mb-1 truncate ${isPlaying ? 'animate-pulse' : ''}`}>
                                                {isPlaying ? 'PLAYING: ' : 'STOPPED: '}
                                                {playlist[currentTrackIndex]?.name || 'Нет трека'}
                                            </div>
                                            <div className="text-xs mt-2">{currentTimeStr} / {durationStr}</div>
                                        </div>
                                        <div className="grid grid-cols-5 gap-1">
                                            <button onClick={prevTrack} className="btn-win98 text-[10px] p-1">PREV</button>
                                            <button onClick={() => { if(!isPlaying) togglePlay(); }} className="btn-win98 text-[10px] p-1">PLAY</button>
                                            <button onClick={() => { if(isPlaying) togglePlay(); }} className="btn-win98 text-[10px] p-1">PAUSE</button>
                                            <button onClick={stopTrack} className="btn-win98 text-[10px] p-1">STOP</button>
                                            <button onClick={nextTrack} className="btn-win98 text-[10px] p-1">NEXT</button>
                                        </div>
                                        <div className="mt-4 text-xs font-bold text-gray-700 uppercase">
                                            Playlist:
                                            <ol className="mt-2 space-y-1 max-h-[150px] overflow-y-auto win98-border-inset bg-white p-1">
                                                {playlist.map((track, index) => (
                                                    <li 
                                                        key={track.id} 
                                                        className={`cursor-pointer p-1 flex justify-between items-center ${index === currentTrackIndex ? 'bg-blue-800 text-white' : 'hover:bg-gray-200 text-black'}`}
                                                        onClick={() => { setCurrentTrackIndex(index); setIsPlaying(true); }}
                                                    >
                                                        <span className="truncate flex-grow">{index + 1}. {track.name}</span>
                                                        <button 
                                                            onClick={(e) => deleteTrack(track.id, e)}
                                                            className="ml-2 bg-red-500 hover:bg-red-600 text-white text-[10px] px-1.5 font-bold win98-border border-b-black border-r-black border-t-white border-l-white"
                                                            title="Удалить трек"
                                                        >
                                                            X
                                                        </button>
                                                    </li>
                                                ))}
                                            </ol>
                                        </div>
                                    </div>
                                    <img src="https://web.archive.org/web/20091027003023im_/http://geocities.com/SouthBeach/Sands/1269/music.gif" alt="Music" />
                                </div>
                            )}

                            {/* ТАБ: ГОСТЕВАЯ КНИГА / ВОСПОМИНАНИЯ */}
                            {activeTab === 'guest' && (
                                <div className="max-w-2xl mx-auto">
                                    <div className="bg-yellow-50 p-4 border-2 border-dashed border-yellow-400 mb-8">
                                        <h3 className="font-bold text-lg text-yellow-800 mb-2">Наши истории и воспоминания</h3>
                                        <form onSubmit={addGuestMessage} className="space-y-3">
                                            <input 
                                                className="w-full p-2 border border-gray-400 text-sm" 
                                                placeholder="Ваше имя" 
                                                value={guestName}
                                                onChange={e => setGuestName(e.target.value)}
                                                required
                                            />
                                            <textarea 
                                                className="w-full p-2 border border-gray-400 text-sm h-24" 
                                                placeholder="Ваша история из жизни..." 
                                                value={guestText}
                                                onChange={e => setGuestText(e.target.value)}
                                                required
                                            />
                                            <button type="submit" className="btn-win98">ДОБАВИТЬ ВОСПОМИНАНИЕ</button>
                                        </form>
                                    </div>
                                    <div className="space-y-4">
                                        {guestMessages.map(msg => (
                                            <div key={msg.id} className="p-3 border-b border-gray-200 group relative">
                                                <div className="flex justify-between text-xs text-gray-500 mb-1">
                                                    <div className="flex items-center gap-2 flex-wrap">
                                                        <span className="font-bold text-blue-700 break-words">{msg.name}</span>
                                                        <span>{msg.date}</span>
                                                    </div>
                                                    <button 
                                                        onClick={() => deleteGuestMessage(msg.id)}
                                                        className="bg-[#c0c0c0] text-black text-[10px] px-1 win98-border opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity hover:bg-red-500 hover:text-white"
                                                    >
                                                        УДАЛИТЬ
                                                    </button>
                                                </div>
                                                <p className="italic text-gray-800 break-words">"{msg.text}"</p>
                                            </div>
                                        ))}
                                        {guestMessages.length === 0 && <p className="text-center text-gray-400 italic">Здесь пока пусто. Поделитесь вашей первой история!</p>}
                                    </div>
                                </div>
                            )}

                        </div>

                        {/* Статус бар внизу */}
                        <div className="bg-[#c0c0c0] p-1 flex flex-wrap sm:flex-nowrap gap-1 sm:gap-2 border-t border-gray-400 text-[10px] sm:text-xs text-black">
                            <div className="win98-border-inset px-2 flex-grow truncate">Готово</div>
                            <div className="win98-border-inset px-2 sm:px-4 truncate">My Computer</div>
                            <div className="win98-border-inset px-2">100%</div>
                        </div>
                    </div>

                    {/* Плавающая кнопка зависит от вкладки */}
                    {activeTab === 'music' ? (
                        <button onClick={() => setIsMusicModalOpen(true)} className="fixed bottom-4 right-4 sm:bottom-6 sm:right-6 btn-win98 shadow-win98 py-3 px-4 sm:py-4 sm:px-6 scale-90 sm:scale-110 flex items-center gap-1 sm:gap-2 z-50">
                            <span>🎵</span> ДОБАВИТЬ ТРЕК
                        </button>
                    ) : (
                        <button onClick={() => setIsModalOpen(true)} className="fixed bottom-4 right-4 sm:bottom-6 sm:right-6 btn-win98 shadow-win98 py-3 px-4 sm:py-4 sm:px-6 scale-90 sm:scale-110 flex items-center gap-1 sm:gap-2 z-50">
                            <span>➕</span> НОВОЕ ФОТО
                        </button>
                    )}

                    {/* Модалка: Фото */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-[100]">
                            <div className="bg-[#c0c0c0] win98-border p-1 w-full max-w-sm">
                                <div className="bg-[#000080] p-1 flex justify-between text-white px-2">
                                    <span className="font-bold text-xs uppercase">UPLOAD.EXE</span>
                                    <button onClick={() => setIsModalOpen(false)} className="bg-[#c0c0c0] text-black px-1 text-xs border">X</button>
                                </div>
                                <form onSubmit={handleAddPhoto} className="p-4 space-y-4 text-black">
                                    <div 
                                        className="bg-white border-2 border-black border-inset p-2 min-h-[100px] flex items-center justify-center cursor-pointer" 
                                        onClick={() => document.getElementById('fileIn').click()}
                                    >
                                        <input type="file" id="fileIn" className="hidden" onChange={e => {
                                            const reader = new FileReader();
                                            reader.onload = () => setNewPhotoPreview(reader.result);
                                            reader.readAsDataURL(e.target.files[0]);
                                        }} />
                                        {newPhotoPreview ? <img src={newPhotoPreview} className="h-24" /> : <b>ВЫБРАТЬ ФОТО</b>}
                                    </div>
                                    <input value={newCaption} onChange={e => setNewCaption(e.target.value)} className="w-full p-2 border-2" placeholder="Кто на фото?" required />
                                    <div className="flex justify-end gap-2">
                                        <button type="button" onClick={() => setIsModalOpen(false)} className="btn-win98">ОТМЕНА</button>
                                        <button type="submit" className="btn-win98">OK</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Модалка: Музыка */}
                    {isMusicModalOpen && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-[100]">
                            <div className="bg-[#c0c0c0] win98-border p-1 w-full max-w-sm">
                                <div className="bg-[#000080] p-1 flex justify-between text-white px-2">
                                    <span className="font-bold text-xs uppercase">ADD_MUSIC.EXE</span>
                                    <button onClick={() => setIsMusicModalOpen(false)} className="bg-[#c0c0c0] text-black px-1 text-xs border">X</button>
                                </div>
                                <form onSubmit={handleAddMusic} className="p-4 space-y-4 text-black">
                                    <div 
                                        className="bg-white border-2 border-black border-inset p-2 min-h-[100px] flex flex-col items-center justify-center cursor-pointer text-center" 
                                        onClick={() => document.getElementById('musicFileIn').click()}
                                    >
                                        <input type="file" accept="audio/*" id="musicFileIn" className="hidden" onChange={e => {
                                            const file = e.target.files[0];
                                            if(file) {
                                                const reader = new FileReader();
                                                reader.onload = () => setNewMusicSrc(reader.result);
                                                reader.readAsDataURL(file);
                                                if(!newMusicName) setNewMusicName(file.name);
                                            }
                                        }} />
                                        {newMusicSrc ? <b className="text-green-700">АУДИОФАЙЛ УСПЕШНО ВЫБРАН</b> : <b>ВЫБРАТЬ АУДИОФАЙЛ (.mp3)</b>}
                                    </div>
                                    <input value={newMusicName} onChange={e => setNewMusicName(e.target.value)} className="w-full p-2 border-2" placeholder="Название трека" required />
                                    <div className="flex justify-end gap-2">
                                        <button type="button" onClick={() => setIsMusicModalOpen(false)} className="btn-win98">ОТМЕНА</button>
                                        <button type="submit" className="btn-win98">OK</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Вьювер фотографий С КОММЕНТАРИЯМИ */}
                    {viewingPhoto && (
                        <div className="fixed inset-0 bg-black/90 flex items-center justify-center p-2 sm:p-4 z-[200]" onClick={() => setViewingPhoto(null)}>
                            <div className="bg-[#c0c0c0] win98-border p-1 max-w-5xl w-full max-h-[95vh] flex flex-col" onClick={e => e.stopPropagation()}>
                                {/* Шапка */}
                                <div className="bg-[#000080] p-1 flex justify-between text-white px-2 flex-shrink-0">
                                    <span className="font-bold text-xs uppercase">IMAGE_VIEWER.EXE</span>
                                    <button onClick={() => setViewingPhoto(null)} className="bg-[#c0c0c0] text-black px-1 text-xs border">X</button>
                                </div>
                                
                                {/* Контент окна */}
                                <div className="p-2 sm:p-4 flex flex-col md:flex-row gap-4 bg-gray-600 overflow-y-auto flex-1">
                                    {/* Блок самой фотографии */}
                                    <div className="flex-1 flex flex-col items-center justify-center min-w-0">
                                        <img src={viewingPhoto.src} className="max-h-[40vh] md:max-h-[60vh] max-w-full object-contain shadow-2xl border-2 sm:border-4 border-white" />
                                        <div className="bg-[#c0c0c0] p-2 mt-4 win98-border w-full text-center">
                                            <p className="text-blue-900 font-bold text-sm sm:text-lg italic break-words">{viewingPhoto.caption}</p>
                                        </div>
                                    </div>
                                    
                                    {/* Блок обсуждения (комментариев) */}
                                    <div className="w-full md:w-80 flex-shrink-0 flex flex-col bg-[#c0c0c0] win98-border h-[40vh] md:h-auto">
                                        <div className="bg-[#000080] text-white px-2 py-1 text-xs font-bold flex justify-between">
                                            <span>ОБСУЖДЕНИЕ.TXT</span>
                                            <span>{comments.filter(c => c.photo_id === viewingPhoto.id).length} МЫСЛЕЙ</span>
                                        </div>
                                        
                                        {/* Список мыслей */}
                                        <div className="flex-1 bg-white overflow-y-auto p-2 text-sm border-2 border-inset border-gray-400">
                                            {comments.filter(c => c.photo_id === viewingPhoto.id).length > 0 ? (
                                                comments.filter(c => c.photo_id === viewingPhoto.id).map(c => (
                                                    <div key={c.id} className="mb-2 border-b border-dashed border-gray-300 pb-2 last:border-0 group relative">
                                                        <div className="flex justify-between items-start">
                                                            <b className="text-blue-800 text-xs">{c.author}:</b>
                                                            <button 
                                                                onClick={() => deleteComment(c.id)}
                                                                className="bg-[#c0c0c0] text-black text-[9px] px-1 win98-border opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity hover:bg-red-500 hover:text-white"
                                                            >
                                                                УДАЛИТЬ
                                                            </button>
                                                        </div>
                                                        <div className="text-gray-800 text-sm mt-0.5 break-words">{c.text}</div>
                                                    </div>
                                                ))
                                            ) : (
                                                <p className="text-gray-500 italic text-xs text-center mt-4">Здесь пока тихо... Напишите свою мысль!</p>
                                            )}
                                        </div>
                                        
                                        {/* Форма добавления */}
                                        <form onSubmit={(e) => handleAddComment(e, viewingPhoto.id)} className="p-2 bg-[#c0c0c0] flex flex-col gap-2">
                                            <input 
                                                value={commentName} 
                                                onChange={e=>setCommentName(e.target.value)} 
                                                placeholder="Ваше Имя" 
                                                className="w-full text-xs p-1 border-2 border-inset border-gray-400" 
                                                required 
                                            />
                                            <textarea 
                                                value={commentText} 
                                                onChange={e=>setCommentText(e.target.value)} 
                                                placeholder="Ваши мысли о фото..." 
                                                className="w-full text-xs p-1 border-2 border-inset border-gray-400 resize-none" 
                                                rows="2" 
                                                required 
                                            />
                                            <button type="submit" className="btn-win98 text-xs w-full py-1">ПОДЕЛИТЬСЯ МЫСЛЬЮ</button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
